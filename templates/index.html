<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding-top: 70px;
        }

        /* ===== NAVBAR ===== */
        .navbar-custom {
            background: rgba(102, 126, 234, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(240, 147, 251, 0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand-custom {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .navbar-brand-custom .logo-icon {
            font-size: 1.6rem;
        }

        .navbar-brand-custom .logo-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .navbar-links {
            display: flex;
            list-style: none;
            gap: 0.5rem;
            margin: 0;
            padding: 0;
        }

        .navbar-links a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .navbar-links a:hover,
        .navbar-links a.active {
            background: rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }

        /* ===== CARD ===== */
        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        /* ===== CENTRADO ===== */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        /* ===== BOTÓN PERSONALIZADO ===== */
        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        /* ===== INPUTS PERSONALIZADOS ===== */
        .form-control, .form-select {
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #f093fb;
            box-shadow: 0 0 10px rgba(240, 147, 251, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }

            .navbar-custom {
                padding: 0.6rem 1rem;
            }

            .navbar-brand-custom .logo-icon {
                font-size: 1.3rem;
            }

            .navbar-brand-custom .logo-text {
                font-size: 0.95rem;
            }

            .navbar-links {
                gap: 0.25rem;
            }

            .navbar-links a {
                font-size: 0.8rem;
                padding: 0.3rem 0.6rem;
            }

            .converter-card {
                width: 90% !important;
                max-width: 400px !important;
                padding: 1.5rem !important;
            }

            .converter-card h2 {
                font-size: 1.5rem;
            }

            .result-box {
                font-size: 1.2rem;
            }

            .page-wrapper {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .navbar-custom {
                padding: 0.5rem 0.75rem;
                flex-wrap: wrap;
            }

            .navbar-brand-custom .logo-icon {
                font-size: 1.2rem;
            }

            .navbar-brand-custom .logo-text {
                font-size: 0.85rem;
            }

            .navbar-links {
                gap: 0.2rem;
                width: 100%;
                justify-content: center;
                margin-top: 0.5rem;
            }

            .navbar-links a {
                font-size: 0.7rem;
                padding: 0.25rem 0.5rem;
            }

            .converter-card {
                width: 95% !important;
                padding: 1.25rem !important;
            }

            .converter-card h2 {
                font-size: 1.3rem;
            }

            .converter-card .form-label {
                font-size: 0.9rem;
            }

            .result-box {
                font-size: 1rem;
            }

            .btn-primary {
                font-size: 0.95rem;
                padding: 0.6rem 1rem;
            }
        }

        @media (min-width: 1024px) {
            .converter-card h2 {
                font-size: 1.75rem;
            }

            .result-box {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-custom">
        <a class="navbar-brand-custom" href="/">
            <span class="logo-icon">💱</span>
            <span class="logo-text">CurrencyApp</span>
        </a>
        <ul class="navbar-links">
            <li><a href="/" class="active">Conversor</a></li>
            <li><a href="#">Historial</a></li>
            <li><a href="#">Acerca de</a></li>
        </ul>
    </nav>

    <!-- CONTENIDO -->
    <div class="page-wrapper">
        <div class="card shadow-lg p-4 converter-card" style="width: 400px; max-width: 90vw;">
            <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="amount"
                           class="form-control form-control-lg"
                           placeholder="Introduce cantidad" required>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <select name="from_currency" class="form-select">
                            <option value="EUR">EUR €</option>
                            <option value="USD">USD $</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>
                    <div class="col text-center align-self-center">
                        →
                    </div>
                    <div class="col">
                        <select name="to_currency" class="form-select">
                            <option value="USD">USD $</option>
                            <option value="EUR">EUR €</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Convertir
                    </button>
                </div>
            </form>

            {% if result is not none %}
                <div class="mt-4 text-center result-box">
                    {{ result }}
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
